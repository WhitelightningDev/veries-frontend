<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 560"
  role="img"
  aria-label="Example of a front-of-ID photo"
>
  <defs>
    <linearGradient id="bg-front" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3f6ff" />
      <stop offset="1" stop-color="#e9f3ff" />
    </linearGradient>
    <linearGradient id="card-front" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f4f7ff" />
    </linearGradient>
    <linearGradient id="tag-front" x1="0" x2="1">
      <stop offset="0" stop-color="#0078ff" />
      <stop offset="1" stop-color="#75b5ff" />
    </linearGradient>
  </defs>

  <rect width="900" height="560" rx="40" fill="url(#bg-front)" />

  <rect
    x="90"
    y="90"
    width="720"
    height="380"
    rx="28"
    fill="url(#card-front)"
    stroke="#cdd8f2"
    stroke-width="6"
  />

  <rect x="120" y="110" width="190" height="46" rx="23" fill="url(#tag-front)" />
  <text
    x="215"
    y="142"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="20"
    fill="#ffffff"
    font-weight="700"
  >
    FRONT
  </text>

  <rect x="130" y="165" width="170" height="170" rx="20" fill="#e7eefc" />
  <path
    d="M185 285c0-40 32-72 72-72s72 32 72 72"
    fill="none"
    stroke="#9db3df"
    stroke-width="18"
    stroke-linecap="round"
  />
  <circle cx="257" cy="230" r="34" fill="#9db3df" />

  <rect x="330" y="175" width="420" height="26" rx="13" fill="#dbe6ff" />
  <rect x="330" y="220" width="340" height="20" rx="10" fill="#e3ecff" />
  <rect x="330" y="255" width="390" height="20" rx="10" fill="#e3ecff" />
  <rect x="330" y="290" width="300" height="20" rx="10" fill="#e3ecff" />
  <rect x="330" y="330" width="260" height="18" rx="9" fill="#eaf1ff" />
  <rect x="330" y="362" width="360" height="18" rx="9" fill="#eaf1ff" />

  <g opacity="0.7">
    <rect x="130" y="395" width="620" height="18" rx="9" fill="#eaf1ff" />
  </g>

  <g opacity="0.75">
    <path
      d="M170 110h560"
      stroke="#bcd0fb"
      stroke-width="10"
      stroke-linecap="round"
    />
  </g>

  <text
    x="450"
    y="515"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="22"
    fill="#6b7aa7"
  >
    Example: Center the front, fill the frame, avoid glare
  </text>
</svg>

